schema_version: 1

context:
  name: infinity
  version: "1.5"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 8daa7c15ce2100fdccfde212337e0cd5cf085869f54dc2634b6c30d61461ecda

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - infinity
      pip_check: true
      python_version: ${{ python_min }}

about:
  license_file: LICENSE
  license: BSD-3-Clause
  summary: All-in-one infinity value for Python. Can be compared to any object.
  homepage: https://github.com/kvesteri/infinity
  repository: https://github.com/kvesteri/infinity
  documentation: https://github.com/kvesteri/infinity

extra:
  recipe-maintainers:
    - pmlandwehr
    - jan-janssen
